name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    container: ghcr.io/realm/swiftlint:latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Lint
        run: swiftlint

  test:
    name: Swift Test
    runs-on: ubuntu-latest

    services:
      altertable:
        image: ghcr.io/altertable-ai/altertable-mock:latest
        ports:
          - 15001:15001
        env:
          ALTERTABLE_MOCK_API_KEY: "test_pk_abc123"
        options: >-
          --health-cmd "exit 0"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 3
          --health-start-period 10s

    steps:
      - uses: actions/checkout@v4
      
      - name: Verify Package.swift
        run: |
          if [ ! -f "Package.swift" ]; then
            echo "::error::Package.swift not found. Ensure this workflow runs on the correct branch."
            exit 1
          fi
          
      - name: Resolve Dependencies
        run: swift package resolve

      - name: Debug Mock
        run: |
          echo "Trying X-API-Key..."
          curl -v -X POST http://localhost:15001/track \
          -H "Content-Type: application/json" \
          -H "X-API-Key: test_pk_abc123" \
          -d '{"event":"debug_event","distinct_id":"debug_user","environment":"test"}' || true

          echo "Trying Authorization Bearer..."
          curl -v -X POST http://localhost:15001/track \
          -H "Content-Type: application/json" \
          -H "Authorization: Bearer test_pk_abc123" \
          -d '{"event":"debug_event","distinct_id":"debug_user","environment":"test"}' || true
          
          echo "Trying Basic Auth..."
          curl -v -X POST http://localhost:15001/track \
          -H "Content-Type: application/json" \
          -u "test_pk_abc123:" \
          -d '{"event":"debug_event","distinct_id":"debug_user","environment":"test"}' || true

      - name: Run Tests
        run: swift test
