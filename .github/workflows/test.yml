name: Test

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    container: ghcr.io/realm/swiftlint:latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Lint
        run: swiftlint

  test:
    name: Swift Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Resolve Dependencies
        run: swift package resolve

      - name: Run Tests
        run: swift test

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      altertable:
        image: ghcr.io/altertable-ai/altertable-mock:latest
        ports:
          - 15001:15001
        env:
          ALTERTABLE_MOCK_API_KEYS: "test_pk_abc123"
          ALTERTABLE_MOCK_ENVIRONMENTS: "production,integration-test"
        options: >-
          --health-cmd "exit 0"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 3
          --health-start-period 10s

    steps:
      - uses: actions/checkout@v4

      - name: Resolve Dependencies
        run: swift package resolve

      - name: Run Integration Tests
        run: swift test --filter IntegrationTests
