name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    container: ghcr.io/realm/swiftlint:latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Lint
        run: swiftlint

  test:
    name: Swift Test
    runs-on: ubuntu-latest

    services:
      altertable:
        image: ghcr.io/altertable-ai/altertable-mock:latest
        ports:
          - 15001:15001
        env:
          ALTERTABLE_MOCK_API_KEYS: "test_pk_abc123"
          ALTERTABLE_MOCK_ENVIRONMENTS: "production,integration-test"
        options: >-
          --health-cmd "exit 0"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 3
          --health-start-period 10s

    steps:
      - uses: actions/checkout@v4
      
      - name: Verify Package.swift
        run: |
          if [ ! -f "Package.swift" ]; then
            echo "::error::Package.swift not found. Ensure this workflow runs on the correct branch."
            exit 1
          fi
          
      - name: Resolve Dependencies
        run: swift package resolve

      - name: Run Tests
        run: swift test
