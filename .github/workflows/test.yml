name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    container: ghcr.io/realm/swiftlint:latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Lint
        run: swiftlint

  test:
    name: Swift Test
    runs-on: macos-14
    # Runs on macOS to test all Apple-specific APIs (OSLog, sysctl, UIKit, etc.) natively.
    # Note: Integration tests requiring the Docker mock server will be skipped automatically.

    steps:
      - uses: actions/checkout@v4
      
      - name: Verify Package.swift
        run: |
          if [ ! -f "Package.swift" ]; then
            echo "::error::Package.swift not found. Ensure this workflow runs on the correct branch."
            exit 1
          fi
          
      - name: Resolve Dependencies
        run: swift package resolve

      - name: Run Tests
        run: swift test
